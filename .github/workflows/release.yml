name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build exe
        run: python -m PyInstaller --onefile --windowed --name "扫雷" --distpath "." main.py

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "扫雷游戏"
          body: |
            ## 🎮 扫雷游戏

            三种难度：**9×9**（10雷）| **27×27**（100雷）| **81×81**（800雷）

            ### 功能
            - ✅ 用户注册/登录
            - ✅ 计时器 & 排行榜
            - ✅ 双击数字格自动展开
            - ✅ 81×81 支持缩放

            ### 运行
            下载 `扫雷.exe`，双击即可运行（仅限 Windows）。
          files: 扫雷.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
