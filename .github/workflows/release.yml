name: Build Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build exe
        run: python -m PyInstaller --onefile --windowed --name "扫雷" --distpath "." main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 扫雷
          path: 扫雷.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "扫雷游戏"
          body: |
            ## 🎮 扫雷游戏

            三种难度：**9×9**（10雷）| **27×27**（100雷）| **81×81**（800雷）

            ### 功能
            - ✅ 用户注册/登录
            - ✅ 计时器 & 排行榜
            - ✅ 双击数字格自动展开（Chord）
            - ✅ 81×81 支持 Ctrl+滚轮缩放

            ### 运行方式
            下载 `扫雷.exe`，双击即可运行（仅限 Windows，无需安装 Python）。
          files: 扫雷.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
