name: Build Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '**.py'
      - 'run.bat'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build exe
        run: python -m PyInstaller --onefile --windowed --name "ж‰«й›·" --distpath "." main.py

      - name: Generate tag
        shell: bash
        run: |
          TAG="v$(date +'%Y.%m.%d-%H%M')"
          echo "TAG=$TAG" >> $GITHUB_ENV
          git tag $TAG
          git push origin $TAG

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: "ж‰«й›·жёёж€Џ ${{ env.TAG }}"
          generate_release_notes: true
          files: ж‰«й›·.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
